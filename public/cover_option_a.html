<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1584px;
    height: 396px;
    background: #0B0F19;
    color: #F3F4F6;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
  }

  /* Ambient Glowing Lighting Orbs */
  .orb-cyan {
    position: absolute;
    top: -80px;
    right: 0px;
    width: 650px;
    height: 650px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.22) 0%, rgba(59, 130, 246, 0.08) 50%, transparent 75%);
    filter: blur(50px);
  }

  .orb-blue {
    position: absolute;
    bottom: -100px;
    left: 220px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
    filter: blur(55px);
  }

  /* Cyber Grid Line Matrix */
  .cyber-grid {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(6, 182, 212, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6, 182, 212, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 90% 80% at 75% 50%, black 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 75% 50%, black 40%, transparent 100%);
  }

  /* Layout Container */
  .container {
    position: relative;
    z-index: 3;
    width: 100%;
    padding-left: 360px; /* Leave space for profile photo overlap */
    padding-right: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 999px;
    background: rgba(6, 182, 212, 0.1);
    border: 1px solid rgba(6, 182, 212, 0.3);
    font-size: 0.72rem;
    font-weight: 700;
    color: #38BDF8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 3.1rem;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #FFFFFF;
    margin-bottom: 8px;
  }

  .cyan-gradient {
    background: linear-gradient(135deg, #FFFFFF 0%, #38BDF8 50%, #818CF8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: #38BDF8;
    letter-spacing: 0.02em;
    margin-bottom: 18px;
  }

  .pills-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    padding: 6px 14px;
    background: rgba(17, 24, 39, 0.7);
    border: 1px solid rgba(56, 189, 248, 0.25);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #E2E8F0;
    display: flex;
    align-items: center;
    gap: 7px;
    backdrop-filter: blur(8px);
  }

  .pill-icon {
    color: #38BDF8;
    display: flex;
    align-items: center;
  }

  /* Right Side Contact Card Column */
  .right-content {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
    border-left: 1px solid rgba(56, 189, 248, 0.15);
    padding-left: 36px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    color: #94A3B8;
    font-weight: 500;
  }

  .contact-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: rgba(6, 182, 212, 0.12);
    border: 1px solid rgba(6, 182, 212, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #38BDF8;
  }
</style>
</head>

</body>
